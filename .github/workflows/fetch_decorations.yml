name: Update and Fetch Decorations and Categories

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows for manual trigger of the workflow

jobs:
  update-and-fetch-decorations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y jq xmlstarlet

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare content directories
        run: |
          set -e
          mkdir -p src/content/decorations src/content/categories

      - name: Fetch Decorations List and Details
        run: |
          set -e
          # set -x
          # Fetch the list of decoration IDs
          curl -s https://api.guildwars2.com/v2/homestead/decorations -o decorations_list.json

          # Initialize an empty array to store the results
          echo "[]" > decorations_work.json

          # Split the list into chunks of 200 IDs and fetch details
          ids=$(jq -r '.[]' decorations_list.json)
          chunk_size=200
          for chunk in $(echo "$ids" | xargs -n $chunk_size | sed 's/ /,/g'); do
            curl -s "https://api.guildwars2.com/v2/homestead/decorations?ids=$chunk" | \
            jq -s 'add' >> temp.json
          done

          # Combine all the chunks into a single JSON array
          jq -s 'add' temp.json > decorations_work.json
          rm temp.json
          rm decorations_list.json

      - name: Merge existing enrichment into API payload
        run: |
          set -e
          node scripts/merge-existing-enrichment.mjs decorations_work.json src/content/decorations

      - name: Fetch Decoration Categories
        run: |
          set -e
          # set -x
          # Fetch the list of decoration category IDs
          curl -s https://api.guildwars2.com/v2/homestead/decorations/categories -o decoration_categories_list.json

          # Initialize an empty array to store the results
          echo "[]" > categories_work.json

          # Split the list into chunks of 200 IDs and fetch details
          category_ids=$(jq -r '.[]' decoration_categories_list.json)
          chunk_size=200
          for chunk in $(echo "$category_ids" | xargs -n $chunk_size | sed 's/ /,/g'); do
            curl -s "https://api.guildwars2.com/v2/homestead/decorations/categories?ids=$chunk" | \
            jq -s 'add' >> temp_categories.json
          done

          # Combine all the chunks into a single JSON array
          jq -s 'add' temp_categories.json > categories_work.json
          rm temp_categories.json
          rm decoration_categories_list.json

      - name: Fetch Decoration Images and Update Data
        run: |
          set -eo pipefail

          fetch_json_with_retries() {
            local url="$1"
            local max_attempts="${2:-4}"
            local default_sleep_seconds="${3:-2}"
            local rate_limit_sleep_seconds="${4:-5}"
            local attempt=1
            local response=""
            local wait_seconds=0

            while [ "$attempt" -le "$max_attempts" ]; do
              response=$(curl -fsSL --connect-timeout 15 --max-time 45 "$url" 2>/dev/null || true)
              if [ -n "$response" ] && printf '%s' "$response" | jq -e . >/dev/null 2>&1; then
                printf '%s' "$response"
                return 0
              fi

              wait_seconds="$default_sleep_seconds"
              if [ -n "$response" ] && echo "$response" | rg -qi 'ratelimit|rate limit|too many requests|maxlag'; then
                wait_seconds="$rate_limit_sleep_seconds"
                echo "Rate limit detected from wiki API (attempt $attempt/$max_attempts). Sleeping ${wait_seconds}s before retry: $url"
              else
                echo "Non-JSON/empty response (attempt $attempt/$max_attempts). Sleeping ${wait_seconds}s before retry: $url"
              fi

              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep "$wait_seconds"
              fi
              attempt=$((attempt + 1))
            done

            return 1
          }

          fetch_wiki_wikitext() {
            local title="$1"
            local encoded response
            encoded=$(printf %s "$title" | jq -sRr @uri)
            response=$(fetch_json_with_retries "https://wiki.guildwars2.com/api.php?action=query&titles=${encoded}&prop=revisions&rvprop=content&rvslots=main&format=json&origin=*" 5 2 || true)
            [[ -z "$response" ]] && { echo ""; return; }
            printf '%s' "$response" | jq -r '
              .query.pages | to_entries[0].value as $p |
              if ($p | has("missing")) or ($p | has("invalid")) then empty
              else ($p.revisions[0].slots.main["*"] // empty)
              end
            '
          }

          wikitext_to_recipe_json() {
            local wikitext="$1"
            local lines
            lines=$(printf '%s' "$wikitext" | awk -f <(cat <<'AWK'
          function strip_wiki(s) {
            gsub(/\[\[[^|\]]*\|([^\]]+)\]\]/, "\\1", s)
            gsub(/\[\[([^\]]+)\]\]/, "\\1", s)
            return s
          }
          function extract_block(s,   lower, pos, i, n, depth, c2) {
            lower = tolower(s)
            pos = index(lower, "{{recipe")
            if (!pos) return ""
            n = length(s)
            i = pos
            depth = 0
            while (i <= n) {
              c2 = substr(s, i, 2)
              if (c2 == "{{") { depth++; i += 2; continue }
              if (c2 == "}}") { depth--; i += 2; if (depth == 0) return substr(s, pos, i - pos); continue }
              i++
            }
            return ""
          }
          function parse_ing_line(slot, val,   qty, item) {
            val = strip_wiki(val)
            if (match(val, /^[0-9]+[[:space:]]+/)) {
              qty = substr(val, RSTART, RLENGTH)
              gsub(/[[:space:]]+$/, "", qty)
              item = substr(val, RSTART + RLENGTH)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", item)
            } else {
              qty = ""
              item = val
            }
            printf "ING\t%d\t%s\t%s\n", slot, qty, item
          }
          { content = content $0 "\n" }
          END {
            block = extract_block(content)
            if (block == "") { exit 0 }
            sub(/^\{\{[Rr]ecipe[[:space:]]*/, "", block)
            sub(/\}\}[[:space:]]*$/, "", block)
            inner = block
            gsub(/^[[:space:]]+|[[:space:]]+$/, "", inner)
            if (substr(inner, 1, 1) != "|") inner = "|" inner
            nlines = split(inner, L, "\n")
            delete params
            for (li = 1; li <= nlines; li++) {
              line = L[li]
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
              if (line ~ /^\|/) {
                line = substr(line, 2)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                eq = index(line, "=")
                if (eq > 0) {
                  key = substr(line, 1, eq - 1)
                  val = substr(line, eq + 1)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", key)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", val)
                  key = tolower(key)
                  gsub(/ /, "_", key)
                  params[key] = val
                }
              }
            }
            has = 0
            for (k in params) {
              if (k ~ /^ingredient[1-4]$/) continue
              has = 1
              printf "PAIR\t%s\t%s\n", k, strip_wiki(params[k])
            }
            for (s = 1; s <= 4; s++) {
              ik = "ingredient" s
              if ((ik in params) && params[ik] != "") {
                has = 1
                parse_ing_line(s, params[ik])
              }
            }
            if (!has) exit 0
          }
          AWK
          ))
            [[ -z "$lines" ]] && { echo "null"; return; }
            echo "$lines" | jq -Rs -f <(cat <<'JQ'
          split("\n") | map(select(length > 0) | split("\t"))
          | reduce .[] as $row ({ingredients: [], m: {}}; 
              if $row[0] == "PAIR" and ($row | length) >= 3 then
                .m[$row[1]] = ($row[2:] | join("\t"))
              elif $row[0] == "ING" and ($row | length) >= 4 then
                .ingredients += [{
                  slot: ($row[1] | tonumber),
                  quantity: (if $row[2] == "" then null else ($row[2] | tonumber) end),
                  item: ($row[3:] | join("\t"))
                }]
              else . end)
            | .m + {ingredients: .ingredients}
            | .rating = (if .rating != null and (.rating | test("^[0-9]+$")) then (.rating | tonumber) else .rating end)
            | .quantity = (if .quantity != null and (.quantity | test("^[0-9]+$")) then (.quantity | tonumber) else .quantity end)
            | .upper_quantity = (if .upper_quantity != null and (.upper_quantity | test("^[0-9]+$")) then (.upper_quantity | tonumber) else .upper_quantity end)
            | .id = (if .id == null then null elif (.id | test("^[0-9]+$")) then (.id | tonumber) elif (.id | test("^[0-9]+(,[0-9]+)+$")) then .id else .id end)
            | if .timegate != null and ((.timegate | ascii_downcase) == "y" or (.timegate | ascii_downcase) == "yes") then .timegate = true else del(.timegate) end
            | if .quantity == null then del(.quantity) else . end
            | if .upper_quantity == null then del(.upper_quantity) else . end
            | with_entries(select(.value != null))
            | if (.ingredients | length) == 0 and (.name == null or .name == "") and (.id == null) then null else . end
          JQ
          )
          }

          apply_wiki_recipe_if_needed() {
            local decoration="$1"
            local wt wikitext recipe_json
            wt=$(echo "$decoration" | jq -r '.wikiTitle // empty')
            [[ -z "$wt" ]] && { echo "$decoration"; return; }
            if echo "$decoration" | jq -e '.recipe != null' >/dev/null 2>&1; then
              echo "$decoration"
              return
            fi
            wikitext=$(fetch_wiki_wikitext "$wt")
            [[ -z "$wikitext" ]] && { echo "$decoration"; return; }
            recipe_json=$(wikitext_to_recipe_json "$wikitext")
            if ! echo "$recipe_json" | jq -e 'type == "object"' >/dev/null 2>&1; then
              echo "$decoration"
              return
            fi
            echo "$decoration" | jq --argjson r "$recipe_json" '. + {recipe: $r}'
          }

          # Read decorations.json and process each decoration
          jq -c '.[]' decorations_work.json | while read -r decoration; do
            name=$(echo "$decoration" | jq -r '.name')
            id=$(echo "$decoration" | jq -r '.id')

            echo "Processing decoration: $name (ID: $id)"

            # Check if preview image data is already present
            hasOriginal=$(echo "$decoration" | jq '.original != null')

            if [ "$hasOriginal" = "true" ]; then
              echo "Decoration $name already has image data. Skipping image fetch."
              decoration=$(apply_wiki_recipe_if_needed "$decoration")
              echo "$decoration" >> decorations_updated.json
              continue
            fi

            # Generate API URL
            encodedName=$(printf %s "$name" | jq -sRr @uri)
            titles="${encodedName}%20(Handiwork)|${encodedName}%20Decoration|${encodedName}"
            apiUrl="https://wiki.guildwars2.com/api.php?action=query&titles=${titles}&prop=pageimages&piprop=original&format=json&origin=*"

            echo "API URL: $apiUrl"

            # Fetch data from the API
            response=$(fetch_json_with_retries "$apiUrl" 5 2 || true)
            if [ -z "$response" ]; then
              echo "Error fetching valid JSON from API for decoration $name"
              # Append the decoration as is to the updated file
              echo "$decoration" >> decorations_updated.json
              continue
            fi

            # Extract pages
            if ! pages=$(printf '%s' "$response" | jq -ce '.query.pages // empty' 2>/dev/null); then
              echo "Error parsing JSON response for decoration $name (invalid or unexpected payload)"
              # Append the decoration as is to the updated file
              echo "$decoration" >> decorations_updated.json
              continue
            fi
            if [ -z "$pages" ]; then
              echo "No pages found in JSON response for decoration $name"
              echo "$decoration" >> decorations_updated.json
              continue
            fi

            # Initialize imageInfo
            imageInfo=null

            # Loop through pages
            for pageId in $(echo "$pages" | jq -r 'keys[]'); do
              if [[ ! "$pageId" =~ ^- ]]; then
                page=$(echo "$pages" | jq ".\"$pageId\"")
                pageTitle=$(echo "$page" | jq -r '.title')
                if [[ "$pageTitle" == *"Handiwork"* ]]; then
                  imageInfo="$page"
                  break
                elif [[ "$pageTitle" == *"Decoration"* ]]; then
                  imageInfo="$page"
                elif [[ "$imageInfo" == "null" ]]; then
                  imageInfo="$page"
                fi
              fi
            done

            # Update decoration with wikiTitle
            if [[ "$imageInfo" != "null" ]]; then
              wikiTitle=$(echo "$imageInfo" | jq -r '.title')
              decoration=$(echo "$decoration" | jq --arg wikiTitle "$wikiTitle" '. + {wikiTitle: $wikiTitle}')
            else
              echo "No valid page found for decoration $name"
            fi

            # Check if imageInfo contains 'original'
            hasOriginal=$(echo "$imageInfo" | jq '.original != null')
            if [[ "$imageInfo" != "null" && "$hasOriginal" = "true" ]]; then
              # Add the image URLs and dimensions to the decoration object
              original=$(echo "$imageInfo" | jq '.original')
              decoration=$(echo "$decoration" | jq --argjson original "$original" '. + {original: $original}')
            elif [[ "$imageInfo" != "null" ]]; then
              # Fallback to RDF data
              fullFilename=""
              rdfTitle=$(echo "$imageInfo" | jq -r '.title' | sed 's/ /_/g')
              rdfApiUrl="https://wiki.guildwars2.com/index.php?title=Special:ExportRDF/${rdfTitle}"

              echo "Fetching RDF data from: $rdfApiUrl"

              # Fetch RDF data
              rdfData=$(curl -fsSL --connect-timeout 15 --max-time 45 "$rdfApiUrl" 2>/dev/null || true)
              if [ -z "$rdfData" ]; then
                echo "Error fetching RDF data for decoration $name"
                # Append the decoration as is to the updated file
                echo "$decoration" >> decorations_updated.json
                continue
              fi

              # Attempt to extract the full filename
              echo "Processing RDF data"
              tempFilename=$(echo "$rdfData" | {
                xmlstarlet sel -N rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" \
               -N property1="http://wiki-en.guildwars2.com/wiki/Special:URIResolver/Property-3A" \
               -N property2="http://wiki.guildwars2.com/wiki/Special:URIResolver/Property-3A" \
               -t -v "//property1:Has_appearance/@rdf:resource" \
               -o " " \
               -v "//property2:Has_appearance/@rdf:resource"
                cat >/dev/null
              })
              echo "Temp filename: $tempFilename"
              
              if [ $? -ne 0 ]; then
                echo "Error processing RDF data with xmlstarlet for decoration $name"
                # Append the decoration as is to the updated file
                echo "$decoration" >> decorations_updated.json
                continue
              fi

              # Check if a valid filename was found
              if [ -n "$tempFilename" ]; then
                echo "Found valid filename: $tempFilename"
                fullFilename="$tempFilename"
              else
                echo "No valid filename found in RDF response for decoration $name"
              fi

              if [[ -n "$fullFilename" ]]; then
                # Truncate the filename to get only the last part of the path
                truncatedFilename=$(basename "$fullFilename")
                # Replace "-3A" with ":"
                filenameTitle=$(echo "$truncatedFilename" | tr -d '\r\n' | sed 's/[[:space:]]*$//' | sed 's/-3A/:/g' | jq -sRr @uri)
                echo "Filename title: '$filenameTitle'"
                fallbackApiUrl="https://wiki.guildwars2.com/api.php?action=query&titles=${filenameTitle}&prop=pageimages&piprop=original&format=json&origin=*"

                echo "Fetching image using filename from: $fallbackApiUrl"

                # Fetch data from the API using the filename
                fallbackResponse=$(fetch_json_with_retries "$fallbackApiUrl" 5 2 || true)
                if [ -z "$fallbackResponse" ]; then
                  echo "Error fetching valid fallback JSON for decoration $name"
                  # Append the decoration as is to the updated file
                  echo "$decoration" >> decorations_updated.json
                  continue
                fi

                if ! fallbackPages=$(printf '%s' "$fallbackResponse" | jq -ce '.query.pages // empty' 2>/dev/null); then
                  echo "Error parsing fallback JSON response for decoration $name (invalid or unexpected payload)"
                  # Append the decoration as is to the updated file
                  echo "$decoration" >> decorations_updated.json
                  continue
                fi
                if [ -z "$fallbackPages" ]; then
                  echo "No fallback pages found for decoration $name"
                  echo "$decoration" >> decorations_updated.json
                  continue
                fi

                # Loop through fallback pages
                fallbackImageInfo=null
                for fallbackPageId in $(echo "$fallbackPages" | jq -r 'keys[]'); do
                  if [[ "$fallbackPageId" != "-1" ]]; then
                    fallbackImageInfo=$(echo "$fallbackPages" | jq ".\"$fallbackPageId\"")
                    break
                  fi
                done

                if [[ "$fallbackImageInfo" != "null" ]]; then
                  original=$(echo "$fallbackImageInfo" | jq '.original')
                  decoration=$(echo "$decoration" | jq --argjson original "$original" '. + {original: $original}')
                else
                  echo "No original image found using filename for decoration $name"
                fi
              else
                echo "No valid filename found in RDF response for decoration $name"
              fi
            else
              echo "No image information found for decoration $name"
            fi

            decoration=$(apply_wiki_recipe_if_needed "$decoration")
            echo "$decoration" >> decorations_updated.json
          done

          # Combine updated decorations into a JSON array
          if [ -f decorations_updated.json ]; then
            jq -s '.' decorations_updated.json > decorations_work.json
            rm decorations_updated.json
          else
            echo "No decorations were processed successfully."
            exit 1
          fi

      - name: Sync API data to content files
        run: |
          set -e
          utc_day=$(date -u +%F)
          node scripts/sync-api-to-content.mjs "$utc_day" decorations_work.json categories_work.json src/content/decorations src/content/categories
          rm -f decorations_work.json categories_work.json

      - name: Localize decoration images
        run: |
          set -e
          node scripts/localize-decoration-images.mjs src/content/decorations

      - name: Commit and push updated decorations and categories
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/ src/assets/decorations/ public/images/
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update decoration data and changelog"
            git push
          fi