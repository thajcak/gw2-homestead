name: Populate Changelog From Git History

on:
  workflow_dispatch:
    inputs:
      commit_to_branch:
        description: "Commit generated changelog.json to current branch"
        required: false
        default: false
        type: boolean

jobs:
  populate-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate changelog from git history
        run: |
          set -e
          chmod +x scripts/generate-changelog-from-git-history.sh
          ./scripts/generate-changelog-from-git-history.sh public/changelog.json
          echo "Generated changelog:"
          jq '.' public/changelog.json

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-from-history
          path: public/changelog.json

      - name: Commit changelog to branch
        if: ${{ github.event.inputs.commit_to_branch == 'true' }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/changelog.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Populate changelog from git history"
            git push
          fi
